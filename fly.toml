# fly.toml file generated for Fly.io deployment
app = "destajos-google"
primary_region = "lax"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "destajos_data"
  destination = "/data"

[env]
  DATABASE_PATH = "/data/destajos.db"
  NODE_ENV = "production"
